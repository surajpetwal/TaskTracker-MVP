name: Build and Release APK

on:
  push:
    branches: [ main, master, day-3-crud, day-8-notifications, day-9-categories, day-10-export ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Generate Debug Keystore
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/day-3-crud' || github.ref == 'refs/heads/day-9-categories'

    steps:
    - uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: release-apk
        path: ./apk

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
      with:
        tag_name: v${{ steps.date.outputs.date }}
        release_name: Task Tracker Build ${{ steps.date.outputs.date }}
        body: |
          Automated build of Task Tracker APK
          
          ## Features
          - Daily task management
          - Points and quota system
          - Streak tracking
          - Calendar view
          - Statistics dashboard
          
          ## Installation
          Download the APK and install on your Android device.
          
          Note: This is an unsigned release APK. For production, sign with your own keystore.
        draft: false
        prerelease: false

    - name: Upload APK to Release
      if: steps.create_release.outputs.upload_url != ''
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./apk/app-release.apk
        asset_name: task-tracker-${{ steps.date.outputs.date }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Release Status
      if: always()
      run: |
        if [ "${{ steps.create_release.outcome }}" == "success" ]; then
          echo "✅ Release created successfully!"
        else
          echo "⚠️ Release step skipped or failed. This is OK - APK is still available in artifacts."
          echo "To enable releases, add GITHUB_TOKEN secret with 'repo' and 'workflow' permissions."
        fi
