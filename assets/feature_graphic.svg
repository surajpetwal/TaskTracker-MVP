<svg width="1024" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6200EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3700B3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGradient)"/>
  
  <!-- Safe zone indicator (bottom 50px) -->
  <rect x="0" y="450" width="1024" height="50" fill="#1a1a1a" opacity="0.3"/>
  
  <!-- App Icon Representation -->
  <g transform="translate(250, 200)">
    <!-- Circle background -->
    <circle cx="60" cy="60" r="80" fill="#FFFFFF"/>
    <!-- Checkmark -->
    <path d="M30 60 L50 80 L90 40" stroke="#6200EE" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">Task Tracker</text>
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" opacity="0.9">Track • Earn • Succeed</text>
  
  <!-- Feature badges -->
  <g transform="translate(400, 320)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#FFFFFF" opacity="0.2"/>
    <text x="60" y="26" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Daily Tasks</text>
    
    <rect x="140" y="0" width="120" height="40" rx="20" fill="#FFFFFF" opacity="0.2"/>
    <text x="200" y="26" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Points</text>
    
    <rect x="280" y="0" width="120" height="40" rx="20" fill="#FFFFFF" opacity="0.2"/>
    <text x="340" y="26" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Streaks</text>
  </g>
  
  <!-- Safe zone text -->
  <text x="512" y="485" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.5" text-anchor="middle">Safe Zone - Keep Empty</text>
</svg>
