<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6200EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3700B3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="256" cy="256" r="220" fill="url(#iconGradient)" filter="url(#shadow)"/>
  
  <!-- White circle for checkmark background -->
  <circle cx="256" cy="256" r="150" fill="#FFFFFF"/>
  
  <!-- Checkmark -->
  <path d="M176 256 L236 316 L336 196" 
        stroke="#6200EE" 
        stroke-width="24" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Decorative dots -->
  <circle cx="180" cy="180" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="332" cy="180" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="180" cy="332" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="332" cy="332" r="12" fill="#FFFFFF" opacity="0.6"/>
</svg>
